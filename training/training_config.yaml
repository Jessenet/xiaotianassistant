# FunctionGemma训练配置

model:
  base_model: "./model_cache/pruned_model"  # 裁剪后的模型 (词表+层数裁剪)
  # base_model: "google/functiongemma-270m-it"  # 原始模型 (备用)
  model_type: "function_calling"
  max_length: 256
  cache_dir: "./model_cache"  # 使用本地缓存目录
  
training:
  output_dir: "./output/gemma_finetuned_v6"
  num_train_epochs: 10
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2  # 有效batch_size=16
  learning_rate: 3e-5
  weight_decay: 0.01
  warmup_steps: 50
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  fp16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  dataloader_num_workers: 0
  
lora:
  enabled: false  # 关闭 LoRA, 使用 full fine-tuning (小模型更有效)
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  
dataset:
  train_file: "data/music_control_train_balanced.jsonl"
  eval_file: "data/music_control_eval_balanced.jsonl"
  max_samples: 10000
  
functions:
  - name: "play_song"
    description: "播放指定的歌曲"
    parameters:
      - name: "song_name"
        type: "string"
        description: "要播放的歌曲名称"
      - name: "artist"
        type: "string"
        description: "歌手名称（可选）"
        required: false
        
  - name: "pause_music"
    description: "暂停当前播放的音乐"
    parameters: []
    
  - name: "resume_music"
    description: "继续播放音乐"
    parameters: []
    
  - name: "next_song"
    description: "播放下一首歌曲"
    parameters: []
    
  - name: "previous_song"
    description: "播放上一首歌曲"
    parameters: []
    
  - name: "set_volume"
    description: "设置音量"
    parameters:
      - name: "level"
        type: "integer"
        description: "音量级别，范围0-100"
        required: true
